    <script>
        // Start of Engine Script Context
        // ============================================================================
        // LAYER 1: CANVAS INSTANTIATION & VARIATION SETTINGS
        // ============================================================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            generateClouds();
        }
        window.addEventListener('resize', resizeCanvas);


          const PLANE_TYPES = [
            { model: 'F16', speed: 3.2, width: 65, height: 25, color: '#7a8b99', spriteUrl: '' }, // Up from 1.8
            { model: 'F22', speed: 4.0, width: 75, height: 30, color: '#5c6b73', spriteUrl: '' }, // Up from 2.5
            { model: 'SU57', speed: 3.6, width: 80, height: 32, color: '#4a5759', spriteUrl: '' }, // Up from 2.2
            { model: 'SU22', speed: 2.8, width: 60, height: 28, color: '#6b705c', spriteUrl: '' }  // Up from 1.4
        ];


        const ENEMY_NAMES = ["Hawkeye", "Silver", "Yanki", "Dodo", "Heaven", "Commander", "Dagger", "JDM", "Koknocker", "Yao", "Raven"];

        // ============================================================================
        // LAYER 2: INTERACTIVE INPUT CONTROLS SYSTEM
        // ============================================================================
        
                // ============================================================================
        // BURGER MENU CONTROLLER INTERSECT MODULE
        // ============================================================================
        let isNavMenuOpen = false;

        function toggleNavigationMenu(event) {
            if (event) {
                event.stopPropagation(); // Prevents the click from triggering game commands underneath!
            }
            
            const btn = document.getElementById('burgerBtn');
            const drawer = document.getElementById('navDrawer');
            
            isNavMenuOpen = !isNavMenuOpen;
            
            if (isNavMenuOpen) {
                btn.classList.add('open');
                drawer.classList.add('open');
                
                // OPTIONAL STRATEGY: If game is active, trigger an input freeze while menu is examined
                if (gameState === 'PLAYING') {
                    input.up = input.down = input.left = input.right = input.shootBullet = false;
                }
            } else {
                btn.classList.remove('open');
                drawer.classList.remove('open');
            }
        }

        // AUTO-CLOSE SAFETIES: If a user clicks outside the menu onto the canvas, close the drawer smoothly
        window.addEventListener('click', () => {
            if (isNavMenuOpen) toggleNavigationMenu();
        });
        window.addEventListener('touchstart', (e) => {
            // Let touch close the menu safely if tapping outside the navigation boundary
            if (isNavMenuOpen && e.touches[0].clientX > 260) {
                toggleNavigationMenu();
            }
        });

        
        
        
        
        const input = {
            up: false, down: false, left: false, right: false,
            shootBullet: false, shootMissile: false,
            isTouch: false,
            joystick: { active: false, startX: 0, startY: 0, curX: 0, curY: 0, vx: 0, vy: 0 }
        };

        let touchButtons = {
            bullet: { x: 0, y: 0, radius: 35 },
            missile: { x: 0, y: 0, radius: 35 }
        };

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') input.up = true;
            if (key === 's') input.down = true;
            if (key === 'a') input.left = true;
            if (key === 'd') input.right = true;
            if (e.key === 'Shift') input.shootBullet = true;
            if (e.key === '/' || e.key === '?') {
                if (!input.shootMissile) player.fireMissile();
            }
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') input.up = false;
            if (key === 's') input.down = false;
            if (key === 'a') input.left = false;
            if (key === 'd') input.right = false;
            if (e.key === 'Shift') input.shootBullet = false;
        });

        window.addEventListener('touchstart', (e) => {
            input.isTouch = true;
            touchButtons.bullet = { x: canvas.width - 140, y: canvas.height - 70, radius: 35 };
            touchButtons.missile = { x: canvas.width - 60, y: canvas.height - 120, radius: 35 };

            for (let touch of e.touches) {
                if (touch.clientX < canvas.width / 2 && !input.joystick.active) {
                    input.joystick.active = true;
                    input.joystick.startX = touch.clientX;
                    input.joystick.startY = touch.clientY;
                    input.joystick.curX = touch.clientX;
                    input.joystick.curY = touch.clientY;
                }
                let distB = Math.hypot(touch.clientX - touchButtons.bullet.x, touch.clientY - touchButtons.bullet.y);
                let distM = Math.hypot(touch.clientX - touchButtons.missile.x, touch.clientY - touchButtons.missile.y);
                if (distB < touchButtons.bullet.radius) input.shootBullet = true;
                if (distM < touchButtons.missile.radius) player.fireMissile();
            }
        });

        window.addEventListener('touchmove', (e) => {
            if (!input.joystick.active) return;
            for (let touch of e.touches) {
                if (touch.clientX < canvas.width / 2) {
                    input.joystick.curX = touch.clientX;
                    input.joystick.curY = touch.clientY;
                    let dx = input.joystick.curX - input.joystick.startX;
                    let dy = input.joystick.curY - input.joystick.startY;
                    let dist = Math.hypot(dx, dy);
                    let maxDist = 50;
                    if (dist > maxDist) {
                        dx = (dx / dist) * maxDist;
                        dy = (dy / dist) * maxDist;
                    }
                    input.joystick.vx = dx / maxDist;
                    input.joystick.vy = dy / maxDist;
                }
            }
        });


        // FIXED FOR MULTI-TOUCH STICKINESS: Identifies exactly which finger leaves the screen
        window.addEventListener('touchend', (e) => {
            // Loop through all fingers that just left the glass on this frame
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                
                // 1. If it was the joystick finger, immediately kill velocity forces
                if (input.joystick.active) {
                    // Check if the lifted touch matches our active joystick coordinates
                    let distToJoystickStart = Math.hypot(t.clientX - input.joystick.startX, t.clientY - input.joystick.startY);
                    if (distToJoystickStart < 80 || t.clientX < canvas.width / 2) {
                        input.joystick.active = false;
                        input.joystick.vx = 0;
                        input.joystick.vy = 0;
                    }
                }
                
                // 2. If it was the bullet firing finger, stop the guns instantly
                let distToBulletBtn = Math.hypot(t.clientX - touchButtons.bullet.x, t.clientY - touchButtons.bullet.y);
                if (distToBulletBtn < touchButtons.bullet.radius + 15) {
                    input.shootBullet = false;
                }
            }

            // SAFETY NET: If absolutely all fingers leave the glass, wipe every state clean
            if (e.touches.length === 0) {
                input.joystick.active = false;
                input.joystick.vx = 0;
                input.joystick.vy = 0;
                input.shootBullet = false;
            }
        });


        // ============================================================================
        // LAYER 3: GAME STATE & PROJECTILE MANAGEMENT SYSTEMS (UPGRADED)
        // ============================================================================
        let playerProjectiles = [];
        let enemyProjectiles = [];
        let globalScore = 0;

        // Add  high score
        let highScore = parseInt(localStorage.getItem('squad_high_score')) || 0;

        // Helper function to check and save records
        function checkAndUpdateHighScore() {
            if (globalScore > highScore) {
                highScore = globalScore;
                // Save the new record permanently into browser storage memory
                localStorage.setItem('squad_high_score', highScore.toString());
            }
        }

        
        // Game flow state tracking: 'START', 'PLAYING', 'GAMEOVER'
        let gameState = 'START'; 

        // Screen Shake & Particles
        let explosionParticles = [];
        let screenShakeIntensity = 0;



        // Add pickups
        let activePickups = [];

        // Weapon Upgrade Global Tracking States
        let bulletUpgradeTimer = 0; // Counts frames remaining (60 frames = 1 second)
        let upgradedMissileStock = 0; // Stores charges remaining for upgraded missiles

        class Pickup {
            constructor() {
                // Spawn off-screen to the right
                this.x = canvas.width + 50;
                // Keep them inside the active flight corridor zone
                this.y = (canvas.height * 0.45) + Math.random() * (canvas.height * 0.4);
                
                this.width = 25;
                this.height = 25;
                
                // Match the exact velocity of your fast foreground hills layer!
                this.speed = 3.8; 
                
                // Randomly select type: 'AMMO', 'MISSILE', or 'HEALTH'
                const types = ['AMMO', 'MISSILE', 'HEALTH'];
                this.type = types[Math.floor(Math.random() * types.length)];
                
                this.markedForRemoval = false;
                this.hoverOffset = Math.random() * Math.PI * 2; // For smooth floating animation
            }

            update() {
                if (gameState !== 'PLAYING') return;

                this.x -= this.speed;
                this.hoverOffset += 0.05; // Drives gentle floating cycle

                if (this.x < -this.width * 2) {
                    this.markedForRemoval = true;
                }
            }

            draw() {
                ctx.save();
                // Calculate a gentle up-and-down floating variation
                let animY = this.y + Math.sin(this.hoverOffset) * 5;
                ctx.translate(this.x, animY);

                // Assign vibrant neon glow schemes based on item type
                let glowColor = '#00ff00'; // Green for Health
                if (this.type === 'AMMO') glowColor = '#ffff00'; // Yellow for Double Bullets
                if (this.type === 'MISSILE') glowColor = '#ff00ff'; // Magenta for Heavy Missiles

                ctx.shadowColor = glowColor;
                ctx.shadowBlur = 15;

                // Draw Outer Octagonal Crystal Containment Pod
                ctx.strokeStyle = glowColor;
                ctx.lineWidth = 2;
                ctx.fillStyle = 'rgba(10, 15, 25, 0.75)';
                
                ctx.beginPath();
                ctx.moveTo(-10, -12); ctx.lineTo(10, -12);
                ctx.lineTo(12, -10);  ctx.lineTo(12, 10);
                ctx.lineTo(10, 12);   ctx.lineTo(-10, 12);
                ctx.lineTo(-12, 10);  ctx.lineTo(-12, -10);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // Draw Core Tech Emblem Inside Box
                ctx.fillStyle = glowColor;
                ctx.font = 'bold 10px Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                let label = 'H';
                if (this.type === 'AMMO') label = 'A';
                if (this.type === 'MISSILE') label = 'M';
                
                ctx.fillText(label, 0, 1);
                ctx.restore();
            }
        }




        // Addind exhaust
        let exhaustTrails = [];


        // Add stars
        let backdropStars = [];
        const MAX_STARS = 45; // Keeps backdrop clean and fast without cluttering the screen

        // Add mountains
        let landscapeLayers = [];

        function buildMountainRanges() {
            landscapeLayers = [
                {
                    // Far Mountain Range: Towering, sharp, deeply jagged alpine peaks
                    speed: 0.3,
                    color: '#08080f', 
                    heightVariation: 0.38, // Amplified height to make them tower into the sky
                    peaks: [],
                    seed: 14 // Higher seed value produces much more jagged, rocky edges
                },
                {
                    // Mid Mountain Range: Medium-sized rolling ridges
                    speed: 1.2,
                    color: '#0b0b14', 
                    heightVariation: 0.18,
                    peaks: [],
                    seed: 5
                },
                {
                    // Foreground Foot-Hills Range: Low-profile, smooth ground lines
                    speed: 3.8,
                    color: '#0f0f1c', 
                    heightVariation: 0.08,
                    peaks: [],
                    seed: 2 // Low seed value flattens and smooths out the hills
                }
            ];

            // Procedurally map out uniform peak coordinates across screen spans
            landscapeLayers.forEach(layer => {
                layer.peaks = [];
                const peakResolution = 50; 
                const totalPoints = peakResolution + 5; 
                
                for (let i = 0; i < totalPoints; i++) {
                    let baseHeight = Math.sin(i * 0.35) * Math.cos(i * 0.12 * layer.seed);
                    
                    // Apply extra jagged noise calculation if generating the towering far background layer
                    let noiseFactor = (layer.seed > 10) ? 0.35 : 0.15;
                    let noise = Math.sin(i * 2.2) * noiseFactor; 
                    
                    let finalizedPeakHeight = (baseHeight + noise) * 0.5 + 0.5; 
                    layer.peaks.push(finalizedPeakHeight);
                }
                layer.offsetX = 0; 
            });
        }


        // ============================================================================
        // LAYER 3: ATMOSPHERIC RAIN VECTOR ENGINE (REPLACES BACKDROP STARS)
        // ============================================================================
        //let playerProjectiles = [];
        //let enemyProjectiles = [];
        //let globalScore = 0;
        //let gameState = 'START'; 

        //let screenShakeIntensity = 0;

        // WEATHER MATRIX SETUP
        let weatherRaindrops = [];
        //maybe too much rain
        const MAX_RAIN_DROPLETS = 120; // Dense but highly optimized for mobile devices

        class RainDrop {
            constructor() {
                this.reset(true); // Initialize randomly across the full canvas area at launch
            }

            reset(isInitialSpawn = false) {
                // If it's the initial game load, scatter drops randomly across the screen width and height
                // Otherwise, respawn them completely off-screen at the top or right edges
                //this.x = isInitialSpawn ? Math.random() * canvas.width : canvas.width + Math.random() * 200;
                //this.y = isInitialSpawn ? Math.random() * canvas.height : -20;
                
                // If it's the very first game bootup, scatter drops completely over the full monitor grid
                if (isInitialSpawn) {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                } else {
                    // SCREEN-WIDE FIX: Randomly distribute half the drops to spawn from the top sky ceil, 
                    // and the other half to spawn from the deep right edge. This spreads the sheets perfectly!
                    if (Math.random() < 0.5) {
                        this.x = Math.random() * canvas.width; // Anywhere across the width

        // NEW: Instantly destroys the primary target, applies radial splash damage, and hits the screen with a massive rattle shake
        function triggerNuclearDetonation(nukeX, nukeY, directHitPlane = null) {
            // 1. If a specific plane took the direct hit, force its health to 0 instantly!
            if (directHitPlane) {
                directHitPlane.hasBeenHit = true;
                directHitPlane.health = 0;
                createExplosion(directHitPlane.x, directHitPlane.y, '#ff4400', 45);
            }

            // 2. Spawn a massive cluster of fiery explosion particles centered on the blast point
            createExplosion(nukeX, nukeY, '#ff1100', 90);  // Deep red nuclear core sparks
            createExplosion(nukeX, nukeY, '#ffaa00', 50);  // Expansive orange outer shockwave ring
            createExplosion(nukeX, nukeY, '#ffff00', 25);  // White-hot plasma points

            // 3. Set the blast radius (in pixels) for nearby collateral targets
            const blastRadius = 250; 
            
            // 4. Scan all active background enemy planes for splash damage
            activePlanes.forEach(plane => {
                // Skip the plane that already took the direct hit so we don't process it twice
                if (plane === directHitPlane) return;

                // Use geometry math to find the exact distance between the nuke and the plane
                let distance = Math.hypot(plane.x - nukeX, plane.y - nukeY);
                
                if (distance <= blastRadius) {
                    plane.hasBeenHit = true;
                    
                    // Proximity scaling: closer = more damage
                    let proximityFactor = 1 - (distance / blastRadius);
                    let nukeDamage = 50 + (proximityFactor * 50); 
                    
                    plane.health -= nukeDamage;

                    // Trigger secondary impact sparks on surrounding planes caught in the shockwave
                    createExplosion(plane.x, plane.y, '#ffcc00', 8);
                    
                    // If the collateral splash damage is enough to kill them, give them a fiery sendoff too
                    if (plane.health <= 0) {
                        createExplosion(plane.x, plane.y, '#ff5500', 25);
                    }
                }
            });
        }


        // NEW: Checks if an enemy plane is caught inside a circular explosion blast wave
        function checkRadialCollision(blastX, blastY, radius, targetPlane) {
            // Locate the centre point of the target enemy jet
            const targetCenterX = targetPlane.x;
            const targetCenterY = targetPlane.y;
            
            // Calculate precise straight-line distance using the Pythagorean theorem
            const distance = Math.hypot(targetCenterX - blastX, targetCenterY - blastY);
            
            // Collision registers true if the target is within the blast radius boundary
            return distance <= radius;
        }

        class PlayerPlane {
            constructor() {
                this.x = 100; this.y = canvas.height / 2;
                this.width = 75; this.height = 24; 
                this.speed = 5.5;
                this.maxHealth = 250; this.health = 250;
                this.hasBeenHit = false;
                this.bulletCooldown = 0;
                
                this.currentRoll = 0; 
                this.targetRoll = 0;
                this.rollSpeed = 0.15; 
            }

            update() {
                if (this.health <= 0) return; 

                this.targetRoll = 0;
                if (input.isTouch) {
                    this.x += input.joystick.vx * this.speed;
                    this.y += input.joystick.vy * this.speed;
                    if (input.joystick.vy > 0.1) this.targetRoll = 1;
                    if (input.joystick.vy < -0.1) this.targetRoll = -1;
                } else {
                    if (input.up) { this.y -= this.speed; this.targetRoll = -1; }
                    if (input.down) { this.y += this.speed; this.targetRoll = 1; }
                    if (input.left) this.x -= this.speed;
                    if (input.right) this.x += this.speed;
                }

                let rollDiff = this.targetRoll - this.currentRoll;
                if (Math.abs(rollDiff) > 0.01) {
                    this.currentRoll += rollDiff * this.rollSpeed;
                } else {
                    this.currentRoll = this.targetRoll;
                }

                this.x = Math.max(20, Math.min(canvas.width - this.width, this.x));
                this.y = Math.max(canvas.height * 0.4, Math.min(canvas.height - 40, this.y));

                if (this.bulletCooldown > 0) this.bulletCooldown--;
                if (input.shootBullet && this.bulletCooldown === 0) {
                    let visualTiltOffset = this.currentRoll * 7;
                    if (bulletUpgradeTimer > 0) {
                        playerProjectiles.push(new Projectile(this.x + this.width * 0.5, this.y - 6 + visualTiltOffset, 14, 'bullet'));
                        playerProjectiles.push(new Projectile(this.x + this.width * 0.5, this.y + 12 + visualTiltOffset, 14, 'bullet'));
                    } else {
                        playerProjectiles.push(new Projectile(this.x + this.width * 0.5, this.y + 4 + visualTiltOffset, 14, 'bullet'));
                    }
                    this.bulletCooldown = 8;
                }
            }

                if (this.health <= 0) return;
                if (!isPlayerMissileOnScreen()) {
                    let visualTiltOffset = this.currentRoll * 7;
                    let m = new Projectile(this.x + this.width * 0.5, this.y + 6 + visualTiltOffset, 16, 'missile');

                // Instead of subtracting, we ADD to the vertical height scale during rolls.
                // This flares the wings out wider to look almost top-down when moving up/down.
                let visualTiltOffset = this.currentRoll * 7; 
                let sideProfileScaleY = 1.0 + (Math.abs(this.currentRoll) * 1.1); // Wings balloon out wide during banking maneuvers

                ctx.fillStyle = '#00ffcc'; 
                ctx.beginPath();

                ctx.moveTo(this.width * 0.5, visualTiltOffset * 0.1);

                ctx.lineTo(this.width * 0.1, (-this.height * 0.15) + visualTiltOffset);

                ctx.lineTo(-this.width * 0.25, (-this.height * 0.45) + visualTiltOffset); // FIXED: Slightly smaller dorsal tail fin depth
                ctx.lineTo(-this.width * 0.45, (-this.height * 0.45) + visualTiltOffset); 
                ctx.lineTo(-this.width * 0.5, visualTiltOffset); 
                ctx.lineTo(-this.width * 0.45, (this.height * 0.15) + visualTiltOffset); 
                ctx.lineTo(-this.width * 0.1, (this.height * 0.2) * sideProfileScaleY + visualTiltOffset); // Bottom main wing expansion line
                ctx.lineTo(this.width * 0.2, (this.height * 0.05) + visualTiltOffset);

        class LightningBranch {
            constructor(startX, startY, endX, endY, thickness, segments) {
                this.points = [{x: startX, y: startY}];
                let currentX = startX, currentY = startY;
                const totalY = endY - startY, segmentHeight = totalY / segments;
                for (let i = 1; i < segments; i++) {
                    currentX += (Math.random() - 0.5) * 45;
                    currentY += segmentHeight;
                    this.points.push({x: currentX, y: currentY});
                }
                this.points.push({x: endX, y: endY});
                this.thickness = thickness;
                this.alpha = 1;

function drawLandscapeRanges() {
            ctx.save();
            
            // Define unique vertical starting baselines for each layer
            // Layer 0 (Far) is high, Layer 1 (Mid) is lower, Layer 2 (Front) is lowest
            const layerBaselines = [
                canvas.height * 0.45, // Far peaks start higher up
                canvas.height * 0.65, // Mid rolling hills step down
                canvas.height * 0.78  // Foreground soft foothills stay very low
            ];
            
            landscapeLayers.forEach((layer, index) => {
                if (gameState === 'PLAYING') {
                    layer.offsetX -= layer.speed;
                }

                ctx.fillStyle = layer.color;
                
                if (flashOpacity > 0) {
                    ctx.shadowColor = 'rgba(120, 160, 255, 0.15)';
                    ctx.shadowBlur = 20;
                }

                ctx.beginPath();
                
                const segmentWidth = canvas.width / 45; 
                const startY = layerBaselines[index]; // Apply the specific baseline for this layer
                
                for (let i = 0; i < layer.peaks.length; i++) {
                    const currentX = (i * segmentWidth) + layer.offsetX;
                    
                    // We also scale the mountain height multiplier relative to screen width 
                    // to prevent them from stretching vertically on tall screens
                    const currentY = startY + (layer.peaks[i] * canvas.height * layer.heightVariation);
                    
                    if (i === 0) {
                        ctx.moveTo(currentX, currentY);
                    } else {
                        ctx.lineTo(currentX, currentY);
                    }
                }

                ctx.lineTo(canvas.width + 300, canvas.height);
                ctx.lineTo(-300, canvas.height);
                ctx.closePath();
                ctx.fill();

                if (layer.offsetX < -segmentWidth) {
                    layer.offsetX = 0;
                    let firstPeak = layer.peaks.shift();
                    layer.peaks.push(firstPeak);
                }
            });
            
            ctx.restore();
        }

        // Unified function to process button interactions safely on both mobile and desktop
        function handleMenuSelection(clientX, clientY) {
            if (gameState === 'START') {
                const btnX = canvas.width / 2 - 100, btnY = canvas.height / 2 + 100;
                if (clientX >= btnX && clientX <= btnX + 200 && clientY >= btnY && clientY <= btnY + 50) {
                    
                    //NEW: Fullscreen activation request
                    // Automatically hides standard browser tabs and address bars on launch (not iphone)!
                    const docEl = document.documentElement;
                    if (docEl.requestFullscreen) docEl.requestFullscreen();
                    else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen(); // Safari alternative
                                     
                    
                    resetFullEngine();
                    gameState = 'PLAYING';
                }
            } else if (gameState === 'GAMEOVER') {
                const btnX = canvas.width / 2 - 90, btnY = canvas.height / 2 + 80;
                if (clientX >= btnX && clientX <= btnX + 180 && clientY >= btnY && clientY <= btnY + 45) {
                    resetFullEngine();
                    gameState = 'PLAYING';
                }
            }
        }

        // Catch desktop mouse clicks safely
        window.addEventListener('click', (e) => {
            handleMenuSelection(e.clientX, e.clientY);
        });

        // FIXED FOR IPHONE SAFARI: Also pass touch starts straight to the menu check handler
        window.addEventListener('touchstart', (e) => {
            if (gameState !== 'PLAYING') {
                const touch = e.changedTouches[0];
                handleMenuSelection(touch.clientX, touch.clientY);
            }
        });

// LAYER 7: CENTRAL LOOP WITH DYNAMIC SOCIALS VISIBILITY (FINAL MASTER EDITION)
// ============================================================================
function animate() {
    ctx.fillStyle = '#040406';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Screen Shake Calculation Matrices
    ctx.save();
    if (screenShakeIntensity > 0) {
        ctx.translate((Math.random() - 0.5) * screenShakeIntensity, (Math.random() - 0.5) * screenShakeIntensity);
        screenShakeIntensity *= 0.9;
        if (screenShakeIntensity < 0.2) screenShakeIntensity = 0;
    }

    // Draw Background Atmosphere Layers
    drawAmbientFlash();
    
    // no stars any more
    backdropStars.forEach(star => {
        star.update();
        star.draw();
    });

 

    drawClouds(); 
    drawLandscapeRanges();

    weatherRaindrops.forEach(drop => { 
        drop.update(); 
        drop.draw(); 
    });

    if (Math.random() < 0.008 && lightning.length === 0) triggerLightning();
    for (let i = lightning.length - 1; i >= 0; i--) {
        lightning[i].draw(); lightning[i].alpha -= 0.06;
        if (lightning[i].alpha <= 0) lightning.splice(i, 1);
    }

    // Global Asset Clean-up passes
    playerProjectiles.forEach(p => p.update());
    enemyProjectiles.forEach(p => p.update());
    playerProjectiles = playerProjectiles.filter(p => !p.markedForRemoval);
    enemyProjectiles = enemyProjectiles.filter(p => !p.markedForRemoval);

    explosionParticles.forEach(p => p.update());
    explosionParticles = explosionParticles.filter(p => p.alpha > 0);

    exhaustTrails.forEach(t => t.update());
    exhaustTrails = exhaustTrails.filter(t => t.alpha > 0);

    activePickups.forEach(p => p.update());
    activePickups = activePickups.filter(p => !p.markedForRemoval);

    // Live Combat Simulation Engine Block
    if (gameState === 'PLAYING' || playerDeathTimer > 0) {

        if (bulletUpgradeTimer > 0) {
            bulletUpgradeTimer--;
        }

        if (playerDeathTimer === 0) {
            let visualTiltOffset = player.currentRoll * 7;
            exhaustTrails.push(new SmokePuff(player.x - player.width * 0.5, player.y + visualTiltOffset));

            if (Math.random() < 0.002 && activePickups.length < 2) {
                activePickups.push(new Pickup());
            }

            activePlanes.forEach(plane => {
                plane.update();
                
                let playerRect = { x: player.x, y: player.y - player.height/2, width: player.width, height: player.height };
                let enemyRect = { x: plane.x, y: plane.y - plane.height/2, width: plane.width, height: plane.height };
                
                if (checkCollision(playerRect, enemyRect)) {
                    createExplosion(player.x, player.y, '#ffaa00', 45); 
                    player.health = 0;
                    player.hasBeenHit = true;
                    plane.health = 0;
                    screenShakeIntensity = 30;
                    playerDeathTimer = 45; 
                    if (navigator.vibrate) navigator.vibrate(120);
                }

                playerProjectiles.forEach(proj => {
                    if (checkCollision(proj, plane)) {
                        proj.markedForRemoval = true;
                        if (proj.type === 'missile' && proj.width > 40) {
                            triggerNuclearDetonation(proj.x, proj.y, plane);
                            screenShakeIntensity = Math.max(screenShakeIntensity, 40);
                        } else {
                            plane.hasBeenHit = true;
                            plane.health -= proj.damage;
                            createExplosion(proj.x, proj.y, '#00ffff', 5);
                            if (plane.health <= 0) {
                                createExplosion(plane.x, plane.y, '#ff5500', 35);
                                screenShakeIntensity = Math.max(screenShakeIntensity, 10);
                            }
                        }
                    }
                });
            });

            player.update();

            activePickups.forEach(pod => {
                let playerRect = { x: player.x, y: player.y - player.height/2, width: player.width, height: player.height };
                let podRect = { x: pod.x, y: pod.y - pod.height/2, width: pod.width, height: pod.height };
                if (checkCollision(playerRect, podRect)) {
                    pod.markedForRemoval = true;
                    if (pod.type === 'HEALTH') {
                        player.health = Math.min(player.maxHealth, player.health + player.maxHealth * 0.3);
                        createExplosion(pod.x, pod.y, '#00ff00', 15);
                    } else if (pod.type === 'AMMO') {
                        bulletUpgradeTimer += 600;
                        createExplosion(pod.x, pod.y, '#ffff00', 15);
                    } else if (pod.type === 'MISSILE') {
                        upgradedMissileStock += 5;
                        createExplosion(pod.x, pod.y, '#ff00ff', 15);
                    }
                    if (navigator.vibrate) navigator.vibrate(80);
                }
            });

            enemyProjectiles.forEach(proj => {
                if (checkCollision(proj, player)) {
                    player.hasBeenHit = true;
                    player.health -= proj.damage;
                    proj.markedForRemoval = true;
                    createExplosion(proj.x, proj.y, '#ff3333', 12);
                    screenShakeIntensity = Math.max(screenShakeIntensity, 15);
                    if (navigator.vibrate) navigator.vibrate(100);

                    if (player.health <= 0) {
                        createExplosion(player.x, player.y, '#ff4400', 40); 
                        playerDeathTimer = 45; 
                    }
                }
            });
        } else {
            if (playerDeathTimer % 5 === 0) {
                createExplosion(player.x + (Math.random() - 0.5) * 30, player.y + (Math.random() - 0.5) * 15, '#ffcc00', 6);
            }
            playerDeathTimer--;
            if (playerDeathTimer === 0) {
                checkAndUpdateHighScore();
                gameState = 'GAMEOVER'; 
            }
        }
    }

    // Draw Layer Entities
    activePickups.forEach(p => p.draw());
    exhaustTrails.forEach(t => t.draw());
    activePlanes.forEach(plane => plane.draw());
    if (gameState === 'PLAYING') player.draw();
    
    playerProjectiles.forEach(p => p.draw());
    enemyProjectiles.forEach(p => p.draw());
    explosionParticles.forEach(p => p.draw());

    ctx.restore(); // Terminate screen shake coordinates

    drawLowHealthWarning();

    // Render Static HUD Text Elements
    drawSilverText();
    
    // DYNAMIC DISCORD VISIBILITY MATRIX CONTROLLER
    const dCord = document.getElementById('discordLink');
    
    if (gameState === 'PLAYING') {
        if (dCord) dCord.style.display = 'none'; // Clear from cockpit HUD while shooting
        
        drawScore();
        drawMobileControls();
        
        ctx.save();
        ctx.font = '14px Arial, sans-serif';
        ctx.textAlign = 'right';
        if (bulletUpgradeTimer > 0) {
            ctx.fillStyle = '#ffff00';
            ctx.fillText(`TWIN GUNS: ${Math.ceil(bulletUpgradeTimer / 60)}s`, canvas.width - 30, 75);
        }
        if (upgradedMissileStock > 0) {
            ctx.fillStyle = '#ff00ff';
            ctx.fillText(`NUKES ARMED: ${upgradedMissileStock}`, canvas.width - 30, 95);
        }
        ctx.restore();

    } else if (gameState === 'START') {
        if (dCord) dCord.style.display = 'flex'; // Display button on main landing cover
        drawStartScreen();
    } else if (gameState === 'GAMEOVER') {
        if (dCord) dCord.style.display = 'flex'; // Display button on failure screen
        bulletUpgradeTimer = 0;
        upgradedMissileStock = 0;
        activePickups = [];
        drawGameOverScreen();
    }
